name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    name: test / lint / format / typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format (prettier check)
        run: pnpm exec prettier --check "src/**/*.{ts,html,css,scss}"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm type-check

      - name: Tests (headless)
        env:
          CI: true
        run: pnpm test -- --watch=false
